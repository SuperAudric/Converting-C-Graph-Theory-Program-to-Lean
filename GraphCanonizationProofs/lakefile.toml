name = "GraphCanonizationProofs"
version = "0.0.1"
defaultTargets = ["ChainDescent", "ChainDescent.Spine", "ChainDescent.OrbitRecovery", "ChainDescent.ClosureCalculus", "ChainDescent.Saturation", "ChainDescent.GaussCount", "ChainDescent.CFI", "ChainDescent.Scheme", "ChainDescent.CascadeOracle", "ChainDescent.LinearOracle", "ChainDescent.Group", "ChainDescent.Cascade", "ChainDescent.CascadeAffine", "ChainDescent.FormsGraphConcrete"]

# Active library: chain-descent canonizer correctness work.
# The retired V4 lean stack (LeanGraphCanonizerV4, UniqueGraphsBySize,
# LeanGraphCanonizerV4Tests, LeanGraphCanonizerV4Correctness, FullCorrectness/)
# lives under `Archive/V4/`. It builds with sorries and is no longer in the
# default build; see `Archive/V4/README.md` to reactivate any of it.

[[require]]
name = "mathlib"
scope = "leanprover-community"
version = "git#master"

[[lean_lib]]
name = "ChainDescent"
